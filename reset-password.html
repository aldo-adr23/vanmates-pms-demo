<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Reset password · Vanmates</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --cream:#FAF5ED; --red:#B94A3F; --red-dark:#A13A30; --red-soft:#F3DDD8;
    --ink:#2B211A; --muted:#8A7B6C; --line:#E4DBC9;
    --serif:"Playfair Display", Georgia, serif;
    --sans:"Plus Jakarta Sans", system-ui, sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;font-family:var(--sans);color:var(--ink)}
  body{min-height:100vh;background:var(--cream);display:grid;place-items:center;padding:40px 24px}
  .card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:42px 38px;width:100%;max-width:440px;box-shadow:0 4px 18px rgba(43,33,26,.04)}
  h1{font-family:var(--serif);font-weight:700;font-size:30px;letter-spacing:-.5px;margin:0 0 6px}
  h1 em{font-style:italic;color:var(--red);font-weight:600}
  .sub{color:var(--muted);font-size:14px;margin-bottom:24px}
  label{display:block;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin:14px 0 5px}
  input{width:100%;background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px 14px;font-family:inherit;font-size:14px;color:var(--ink)}
  input:focus{outline:0;border-color:var(--red);box-shadow:0 0 0 3px var(--red-soft)}
  button{width:100%;background:var(--red);color:#fff;border:0;padding:13px;border-radius:11px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;margin-top:18px}
  button:disabled{opacity:.6;cursor:default}
  button:hover:not(:disabled){background:var(--red-dark)}
  .msg{margin-top:14px;padding:11px 14px;border-radius:9px;font-size:13px}
  .msg.ok{background:#E7F0E3;color:#3e6049;border:1px solid #BFD4B6}
  .msg.err{background:var(--red-soft);color:var(--red-dark);border:1px solid #F4B7AB}
  .footnote{margin-top:18px;text-align:center;font-size:13px;color:var(--muted)}
  .footnote a{color:var(--red);font-weight:600;text-decoration:none}
</style>
</head>
<body>
  <div class="card">
    <h1>Reset your <em>password</em></h1>
    <div class="sub" id="sub">Enter a new password for your Vanmates Portal account.</div>

    <form onsubmit="setNewPassword(event)" id="form" autocomplete="off">
      <label>New password</label>
      <input id="pw1" type="password" required minlength="10" placeholder="At least 10 characters" />
      <label>Confirm password</label>
      <input id="pw2" type="password" required minlength="10" />
      <button type="submit" id="submit">Set new password</button>
    </form>

    <div class="msg" id="msg" style="display:none"></div>

    <div class="footnote">
      <a href="signin.html">← Back to sign in</a>
    </div>
  </div>

<script src="supabase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const sb = window.supabase.createClient(window.VM_SUPABASE_URL, window.VM_SUPABASE_KEY, {
  auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
});

function showMsg(text, ok){
  const el = document.getElementById("msg");
  el.style.display = "block";
  el.className = "msg " + (ok ? "ok" : "err");
  el.textContent = text;
}

async function setNewPassword(e){
  e.preventDefault();
  const pw1 = document.getElementById("pw1").value;
  const pw2 = document.getElementById("pw2").value;
  if(pw1 !== pw2){ showMsg("Passwords don't match.", false); return; }
  if(pw1.length < 10){ showMsg("Password must be at least 10 characters.", false); return; }

  const btn = document.getElementById("submit");
  btn.disabled = true; btn.textContent = "Saving…";

  const { error } = await sb.auth.updateUser({ password: pw1 });
  if(error){
    showMsg("Couldn't update password: " + error.message, false);
    btn.disabled = false; btn.textContent = "Set new password";
    return;
  }
  showMsg("✅ Password updated. Redirecting to sign in…", true);
  setTimeout(() => { window.location.href = "signin.html"; }, 1500);
}

// On load: if there's no recovery session in the URL, show a clearer message
window.addEventListener("load", async () => {
  // Supabase auto-handles the recovery token from the URL hash
  const { data } = await sb.auth.getSession();
  if(!data?.session){
    document.getElementById("form").style.display = "none";
    document.getElementById("sub").innerHTML =
      "This reset link is invalid or has expired. <br><br>" +
      "Go back to <a href='signin.html' style='color:var(--red);font-weight:600'>signin</a> and click <b>Forgot password?</b> to request a new one.";
  }
});
</script>
</body>
</html>
