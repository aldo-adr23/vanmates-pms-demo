<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Sign in · Vanmates</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --cream:#FAF5ED; --cream-2:#F4ECDD;
    --red:#B94A3F; --red-dark:#A13A30; --red-soft:#F3DDD8;
    --ink:#2B211A; --muted:#8A7B6C; --line:#E4DBC9;
    --green:#5C8A6B; --serif:"Playfair Display", Georgia, serif;
    --sans:"Plus Jakarta Sans", system-ui, sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;font-family:var(--sans);color:var(--ink)}
  body{
    min-height:100vh; background:var(--cream);
    display:grid; grid-template-columns:1fr 1fr;
  }
  .left{
    background:linear-gradient(135deg, #B94A3F, #7d2f25);
    color:#fff; padding:60px 56px; display:flex; flex-direction:column;
    position:relative; overflow:hidden;
  }
  .left::before{
    content:""; position:absolute; right:-100px; top:-100px;
    width:400px; height:400px; border-radius:50%;
    background:radial-gradient(circle, #ffffff22, transparent 60%);
  }
  .left::after{
    content:""; position:absolute; left:-80px; bottom:-80px;
    width:300px; height:300px; border-radius:50%;
    background:radial-gradient(circle, #ffffff15, transparent 60%);
  }
  .brand{display:flex;align-items:center;gap:12px;margin-bottom:auto;position:relative;z-index:1}
  .brand-mark{
    width:42px;height:42px;border-radius:11px;
    background:#fff;color:var(--red);
    display:grid;place-items:center;
    font-family:var(--serif);font-style:italic;font-weight:700;font-size:22px;
  }
  .brand-name{font-family:var(--serif);font-weight:700;font-size:24px}
  .brand-name em{font-style:italic;font-weight:600;opacity:.85}
  .hero{position:relative;z-index:1;margin:auto 0}
  .hero h1{
    font-family:var(--serif);font-weight:700;font-size:42px;line-height:1.1;
    letter-spacing:-1px;margin:0 0 18px;
  }
  .hero h1 em{font-style:italic;font-weight:600;color:#FFE2DA}
  .hero p{font-size:16px;line-height:1.5;opacity:.9;max-width:420px}
  .quote{
    margin-top:40px;padding:18px 22px;
    background:#ffffff15;border-radius:14px;backdrop-filter:blur(2px);
    font-family:var(--serif);font-style:italic;font-size:15px;line-height:1.5;max-width:440px;
  }
  .quote-author{font-family:var(--sans);font-style:normal;font-size:12.5px;margin-top:8px;opacity:.7}

  .right{
    padding:60px 56px;display:flex;flex-direction:column;justify-content:center;
    background:var(--cream);
  }
  .form-wrap{max-width:420px;width:100%;margin:auto}
  .form-title{font-family:var(--serif);font-weight:700;font-size:30px;letter-spacing:-.5px}
  .form-title em{font-style:italic;color:var(--red);font-weight:600}
  .form-sub{color:var(--muted);font-size:14px;margin-top:6px;margin-bottom:30px}

  .btn-google{
    width:100%;display:flex;align-items:center;justify-content:center;gap:10px;
    background:#fff;border:1.5px solid var(--line);border-radius:11px;
    padding:13px 18px;font-family:inherit;font-size:14px;font-weight:600;
    color:var(--ink);cursor:pointer;transition:.12s ease;
  }
  .btn-google:hover{border-color:var(--ink);background:var(--cream-2)}
  .btn-google svg{width:20px;height:20px}

  .divider{
    display:flex;align-items:center;gap:14px;margin:22px 0;
    color:var(--muted);font-size:11.5px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;
  }
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--line)}

  .field{margin-bottom:14px}
  .field label{
    display:block;font-size:11px;font-weight:700;color:var(--muted);
    letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px;
  }
  .field input{
    width:100%;background:#fff;border:1px solid var(--line);border-radius:10px;
    padding:12px 14px;font-family:inherit;font-size:14px;color:var(--ink);
    transition:border-color .12s ease;
  }
  .field input:focus{outline:0;border-color:var(--red);box-shadow:0 0 0 3px var(--red-soft)}
  .field-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
  .forgot-link{
    font-size:11.5px;color:var(--red);font-weight:600;text-decoration:none;
  }
  .forgot-link:hover{text-decoration:underline}

  .btn-primary{
    width:100%;background:var(--red);color:#fff;border:0;
    padding:14px;border-radius:11px;font-family:inherit;font-size:14px;font-weight:700;
    cursor:pointer;transition:.12s ease;margin-top:6px;
  }
  .btn-primary:hover{background:var(--red-dark)}

  .footnote{
    text-align:center;margin-top:24px;font-size:13px;color:var(--muted);
  }
  .footnote a{color:var(--red);font-weight:600;text-decoration:none}
  .footnote a:hover{text-decoration:underline}

  .checkbox-row{
    display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted);
    margin:6px 0 14px;
  }
  .checkbox-row input{accent-color:var(--red)}

  @media (max-width:880px){
    body{grid-template-columns:1fr}
    .left{padding:40px 28px;min-height:280px}
    .left .hero h1{font-size:32px}
    .right{padding:36px 28px}
    .quote{display:none}
  }
</style>
</head>
<body>
  <div class="left">
    <div class="brand">
      <div class="brand-mark">V</div>
      <div class="brand-name">Van<em>mates</em></div>
    </div>
    <div class="hero">
      <h1>Welcome to <em>Vanmates Portal</em></h1>
      <p style="font-family:var(--serif);font-style:italic;font-size:18px;font-weight:500;opacity:.92;margin-top:4px">This world is more than ordinary.</p>
    </div>
  </div>

  <div class="right">
    <div class="form-wrap">
      <div class="form-title">Sign <em>in</em></div>
      <div class="form-sub">Enter your credentials or continue with Google.</div>

      <button type="button" class="btn-google" onclick="signInWithGoogle()">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A10.997 10.997 0 0 0 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09 0-.73.13-1.43.35-2.09V7.07H2.18A10.997 10.997 0 0 0 1 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>

      <div class="divider">or sign in with email</div>

      <form onsubmit="signIn(event)" autocomplete="off">
        <div class="field">
          <label>Work email</label>
          <input type="email" name="email" placeholder="aldo@vanmates.com" required />
        </div>
        <div class="field">
          <div class="field-row">
            <label>Password</label>
            <a class="forgot-link" href="#" onclick="requestPasswordReset(event)">Forgot password?</a>
          </div>
          <input type="password" name="password" placeholder="••••••••" required />
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="remember" checked /> <label for="remember" style="font-size:12.5px;font-weight:500;color:var(--muted);text-transform:none;letter-spacing:0;margin:0">Keep me signed in for 30 days</label>
        </div>
        <button type="submit" class="btn-primary">Sign in</button>
      </form>

      <div class="footnote" style="font-size:12.5px;color:var(--muted)">
        Vanmates is invite-only — ask a workspace admin to send you an invite if you don't have an account yet.
      </div>
    </div>
  </div>

<!-- Google Identity Services (loaded async) -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

<!-- Supabase JS client (Phase 1: real auth backend) -->
<script src="supabase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>
const GOOGLE_CLIENT_ID = "802991869168-0dpre0q2b939vmdi6einvlurgkif9h7o.apps.googleusercontent.com";

// Initialize Supabase client. If config is missing (or unreachable), we fall
// back to the legacy sessionStorage allowlist flow so the page still works.
const sb = (window.VM_SUPABASE_URL && window.VM_SUPABASE_KEY && window.supabase)
  ? window.supabase.createClient(window.VM_SUPABASE_URL, window.VM_SUPABASE_KEY, {
      auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
    })
  : null;

// Legacy email allowlist — only used as a fallback when Supabase isn't wired.
const ALLOWED_EMAILS = ["aldo@vanmates.com"];

function decodeJwt(token){
  try {
    const payload = token.split(".")[1].replace(/-/g,"+").replace(/_/g,"/");
    return JSON.parse(decodeURIComponent(escape(atob(payload))));
  } catch(e){ return null; }
}

function finishSignIn(profile){
  // profile = { email, name, picture, sub }
  if(!profile || !profile.email){
    alert("We couldn't read your Google account info. Please try again.");
    return;
  }
  const email = profile.email.toLowerCase();
  if(!ALLOWED_EMAILS.includes(email)){
    alert(
      `${profile.email} isn't on the Vanmates team yet.\n\n` +
      `Vanmates Property Management is invite-only. ` +
      `Ask a workspace admin (aldo@vanmates.com) to send you an invite.`
    );
    return;
  }
  // Persist for the PMS to read on load
  sessionStorage.setItem("vm_session", JSON.stringify({
    email: profile.email,
    name: profile.name,
    picture: profile.picture || null,
    sub: profile.sub || null,
    signedInAt: new Date().toISOString(),
    via: "google"
  }));
  window.location.href = "index.html";
}

async function handleCredentialResponse(resp){
  const profile = decodeJwt(resp.credential);

  // Try to also create a real Supabase session so RLS allows reads + writes
  // in the PMS. This requires Google to be enabled as an Auth provider in
  // Supabase (Auth → Providers → Google) using the same Client ID. If that's
  // not configured yet, signInWithIdToken returns an error and we fall through
  // to the legacy sessionStorage-only flow (the portal still works for reads
  // via the defensive hydrate; writes will silently fail until Supabase is
  // wired up).
  if(sb){
    try {
      const { error } = await sb.auth.signInWithIdToken({
        provider: "google",
        token: resp.credential
      });
      if(error){
        console.warn("[signin] Supabase Google sign-in not configured yet:", error.message);
      } else {
        console.log("[signin] Supabase session created via Google ID token");
      }
    } catch(err){
      console.warn("[signin] Supabase Google sign-in threw:", err.message);
    }
  }

  finishSignIn(profile);
}

function signInWithGoogle(){
  // Real Google Identity Services requires HTTPS. If we're on HTTP (e.g. while
  // the Let's Encrypt cert is still provisioning for portal.vanmates.com),
  // GIS silently refuses to initialize — so fall through to the demo prompt.
  const isSecure = location.protocol === "https:";
  const haveRealId = GOOGLE_CLIENT_ID && !GOOGLE_CLIENT_ID.startsWith("REPLACE_ME");
  const gisReady = !!window.google?.accounts?.id;

  if(isSecure && haveRealId && gisReady){
    google.accounts.id.initialize({
      client_id: GOOGLE_CLIENT_ID,
      callback: handleCredentialResponse,
      ux_mode: "popup",
      auto_select: false,
    });
    google.accounts.id.prompt();
    return;
  }

  // Demo / HTTP fallback — prompt for email and complete locally
  const note = isSecure
    ? "Real OAuth isn't fully wired yet. Type your email to simulate sign-in:"
    : "You're on HTTP (the HTTPS cert is still provisioning).\nReal Google sign-in needs HTTPS — using a quick prompt for now:";
  const email = (prompt("Sign in with Google\n\n" + note, "aldo@vanmates.com") || "").trim();
  if(!email) return;
  finishSignIn({email, name: "Aldo Diaz Rodriguez", picture: null, sub: "demo-" + email});
}

async function signIn(e){
  e.preventDefault();
  const email = (document.querySelector('input[type="email"]')?.value || "").trim().toLowerCase();
  const password = (document.querySelector('input[type="password"]')?.value || "");

  // Real auth via Supabase
  if(sb){
    const submitBtn = e.target.querySelector('button[type="submit"]');
    if(submitBtn){ submitBtn.disabled = true; submitBtn.textContent = "Signing in…"; }
    try {
      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      if(error){
        alert("Sign-in failed: " + error.message + "\n\n" +
              "If you haven't set a password yet, click \"Forgot password?\" — " +
              "the admin will send you a reset link.");
        if(submitBtn){ submitBtn.disabled = false; submitBtn.textContent = "Sign in"; }
        return;
      }
      // The PMS reads the Supabase session on load (see vanmates-pms.html).
      // Also write a vm_session shim for backwards compatibility.
      sessionStorage.setItem("vm_session", JSON.stringify({
        email: data.user.email,
        name: data.user.user_metadata?.name || data.user.email.split("@")[0],
        picture: data.user.user_metadata?.avatar_url || null,
        sub: data.user.id,
        signedInAt: new Date().toISOString(),
        via: "password"
      }));
      window.location.href = "index.html";
      return;
    } catch(err){
      alert("Network error reaching auth server: " + err.message);
      if(submitBtn){ submitBtn.disabled = false; submitBtn.textContent = "Sign in"; }
      return;
    }
  }

  // Fallback: legacy email-allowlist (used only if Supabase isn't loaded)
  if(!email){ window.location.href = "index.html"; return; }
  if(!ALLOWED_EMAILS.includes(email)){
    alert(`${email} isn't on the Vanmates team.\n\nAsk a workspace admin to send you an invite.`);
    return;
  }
  sessionStorage.setItem("vm_session", JSON.stringify({
    email, name: "Aldo Diaz Rodriguez",
    picture: null, sub: null,
    signedInAt: new Date().toISOString(),
    via: "password"
  }));
  window.location.href = "index.html";
}

// "Forgot password?" handler — sends Supabase password-reset email
async function requestPasswordReset(e){
  e.preventDefault();
  const email = (document.querySelector('input[type="email"]')?.value || "").trim().toLowerCase();
  if(!email){ alert("Please enter your work email first, then click \"Forgot password?\""); return; }
  if(!sb){
    // Fall back to mailto if Supabase isn't reachable
    window.location.href = `mailto:aldo@vanmates.com?subject=${encodeURIComponent("Password reset — Vanmates Portal")}&body=${encodeURIComponent("Hi Aldo,\n\nI need a password reset for " + email + ".\n\nThanks!")}`;
    return;
  }
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + "/reset-password.html"
  });
  if(error){
    alert("Couldn't send reset email: " + error.message);
  } else {
    alert("✅ Reset link sent to " + email + ". Check your inbox (and spam folder).");
  }
}

// Optional: render the official Google button when GIS loads with a real Client ID
window.addEventListener("load", () => {
  if(!GOOGLE_CLIENT_ID || GOOGLE_CLIENT_ID.startsWith("REPLACE_ME")) return;
  const tryRender = () => {
    if(!window.google?.accounts?.id) { setTimeout(tryRender, 200); return; }
    google.accounts.id.initialize({
      client_id: GOOGLE_CLIENT_ID,
      callback: handleCredentialResponse,
    });
    // (Optional) silent One Tap — uncomment to auto-prompt returning users
    // google.accounts.id.prompt();
  };
  tryRender();
});
</script>
</body>
</html>
