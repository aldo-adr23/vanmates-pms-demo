<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Reset password · Vanmates</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --cream:#FAF5ED; --cream-2:#F4ECDD;
    --red:#B94A3F; --red-dark:#A13A30; --red-soft:#F3DDD8;
    --ink:#2B211A; --muted:#8A7B6C; --line:#E4DBC9;
    --serif:"Playfair Display", Georgia, serif;
    --sans:"Plus Jakarta Sans", system-ui, sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;font-family:var(--sans);color:var(--ink)}
  body{min-height:100vh;background:var(--cream);display:grid;place-items:center;padding:24px}
  .card{
    width:min(440px, 100%);background:#fff;border:1px solid var(--line);border-radius:18px;
    padding:40px 36px;box-shadow:0 30px 80px -20px rgba(43,33,26,.18);
    position:relative;overflow:hidden;
  }
  .card::before{content:"";position:absolute;right:-60px;top:-60px;width:200px;height:200px;border-radius:50%;
    background:radial-gradient(circle, var(--red-soft), transparent 60%)}

  .brand{display:flex;align-items:center;gap:10px;margin-bottom:28px;position:relative;z-index:1}
  .brand-mark{width:36px;height:36px;border-radius:9px;background:var(--red);color:#fff;
    display:grid;place-items:center;font-family:var(--serif);font-style:italic;font-weight:700;font-size:18px}
  .brand-name{font-family:var(--serif);font-weight:700;font-size:20px}
  .brand-name em{font-style:italic;color:var(--red);font-weight:600}

  .icon-wrap{
    width:54px;height:54px;border-radius:14px;background:var(--red-soft);
    display:grid;place-items:center;margin-bottom:16px;position:relative;z-index:1;
  }
  .icon-wrap svg{width:24px;height:24px;stroke:var(--red);fill:none;stroke-width:2}

  .title{font-family:var(--serif);font-size:26px;font-weight:700;letter-spacing:-.5px;line-height:1.1;position:relative;z-index:1}
  .title em{font-style:italic;color:var(--red);font-weight:600}
  .sub{color:var(--muted);font-size:14px;line-height:1.5;margin-top:8px;margin-bottom:24px;position:relative;z-index:1}

  .field{margin-bottom:14px}
  .field label{display:block;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px}
  .field input{width:100%;background:var(--cream);border:1px solid var(--line);border-radius:10px;
    padding:12px 14px;font-family:inherit;font-size:14px;color:var(--ink);transition:border-color .12s ease}
  .field input:focus{outline:0;background:#fff;border-color:var(--red);box-shadow:0 0 0 3px var(--red-soft)}

  .btn-primary{width:100%;background:var(--red);color:#fff;border:0;padding:13px;border-radius:11px;
    font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:.12s ease}
  .btn-primary:hover{background:var(--red-dark)}

  .footnote{text-align:center;margin-top:20px;font-size:13px;color:var(--muted);position:relative;z-index:1}
  .footnote a{color:var(--red);font-weight:600;text-decoration:none}
  .footnote a:hover{text-decoration:underline}

  .success{
    display:none;background:#E2EDDF;color:#3e6049;padding:14px 16px;border-radius:11px;
    font-size:13px;font-weight:600;line-height:1.4;margin-bottom:16px;
  }
  .success.show{display:block}
  .success svg{width:16px;height:16px;display:inline-block;vertical-align:-3px;margin-right:6px;stroke:#3e6049;fill:none;stroke-width:2.5}
</style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-mark">V</div>
      <div class="brand-name">Van<em>mates</em></div>
    </div>

    <div class="icon-wrap">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>

    <div class="title">Forgot your <em>password?</em></div>
    <div class="sub">Enter your work email and we'll send you a link to reset your password. The link will be valid for 24 hours.</div>

    <div class="success" id="success">
      <svg viewBox="0 0 24 24"><polyline points="5 12 10 17 19 7"/></svg>
      Reset link sent. Check your inbox at <span id="email-echo"></span>.
    </div>

    <form onsubmit="resetPassword(event)" autocomplete="off">
      <div class="field">
        <label>Work email</label>
        <input type="email" id="email" required placeholder="aldo@vanmates.com" />
      </div>
      <button type="submit" class="btn-primary">Send reset link</button>
    </form>

    <div class="footnote">
      <a href="signin.html">← Back to sign in</a>
    </div>
  </div>

<script>
function resetPassword(e){
  e.preventDefault();
  const email = document.getElementById("email").value;
  document.getElementById("email-echo").textContent = email;
  document.getElementById("success").classList.add("show");
  setTimeout(() => { window.location.href = "signin.html"; }, 3500);
}
</script>
</body>
</html>
